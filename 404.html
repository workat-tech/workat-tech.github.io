<!DOCTYPE html>
<html>
<head>
  <script>
    const path = window.location.pathname;

    if (path.startsWith('/jobs')) {
      window.location.replace('https://www.linkedin.com/jobs');
    } else if (path.startsWith('/company')) {
      window.location.replace('https://www.linkedin.com/jobs');
    } else if (path.startsWith('/compare')) {
      window.location.replace('https://levels.fyi');
    } else if (path.startsWith('/ide')) {
      window.location.replace('https://www.online-ide.com');
    } else if (path.startsWith('/collab/ide')) {
      window.location.replace('https://collabedit.net');
    } else if (path.startsWith('/about')) {
      window.location.replace('https://www.linkedin.com/company/workat-tech');
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
